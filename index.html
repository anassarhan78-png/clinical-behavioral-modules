<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الوحدة التعليمية | كلية الطب</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .module-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .module-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .module-card:hover {
            transform: translateY(-5px);
        }
        .module-card h3 {
            color: #0b2b3b;
            margin-bottom: 0.5rem;
        }
        .module-card a {
            display: inline-block;
            margin-top: 1rem;
            background: #e67e22;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="logo">
        <h1>📘 كلية الطب | جامعة الملك فيصل</h1>
        <p>المنهج التفاعلي – العلوم السلوكية</p>
    </div>
    <div class="module-badge">📚 وحدات قابلة للتوسع</div>
</div>
<div class="container">
    <div class="section-card">
        <div class="section-title">الوحدات التعليمية المتاحة</div>
        <div id="modules-container" class="module-list">
            <!-- سيتم تحميلها من config.json -->
            <p>جاري التحميل...</p>
        </div>
    </div>
</div>
<script>
    fetch('config.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('modules-container');
            container.innerHTML = data.modules.map(mod => `
                <div class="module-card">
                    <h3>${mod.title_ar} (${mod.title})</h3>
                    <p>${mod.description}</p>
                    <a href="${mod.path}">الدخول للوحدة →</a>
                </div>
            `).join('');
        })
        .catch(err => {
            document.getElementById('modules-container').innerHTML = '<p>حدث خطأ في تحميل البيانات</p>';
        });
</script>
<div class="footer-note">
    © كلية الطب – جامعة الملك فيصل | أضف وحدات جديدة عبر إدخالها في config.json
</div>
</body>
</html>
